<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Realistic Bee | @code_zenith.ai</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">

<style>
@import url("https://fonts.cdnfonts.com/css/devil-breeze");
@import url("https://fonts.cdnfonts.com/css/poppins");

/* --- YOUR CSS (same as before, shortened here for clarity) --- */
body {
  margin: 0;
  font-family: "Poppins", sans-serif;
  background-color: #1b1b1b;
  color: #eef8ce;
  background-image: url(/Images/bg.png),
    repeating-linear-gradient(to right, transparent 0 500px, #73814b33 500px 501px);
}

/* KEEP ALL YOUR OTHER CSS SAME */
.section { min-height: 100vh; display:flex; align-items:center; justify-content:center;}
#container3D { position: fixed; inset: 0; z-index: 100; pointer-events: none;}
</style>
</head>

<body>

<header>
  <div class="content-fit">
    <div class="logo">@CodeZenithAI</div>
  </div>
</header>

<div class="section" id="banner">
  <div class="title">3D ANIMATION</div>
</div>

<div class="section" id="intro"></div>
<div class="section" id="description"></div>
<div class="section" id="contact"></div>

<div id="container3D"></div><!-- THREE JS (non-module) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.129/build/three.min.js"></script>

<!-- GLTF LOADER (non-module) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.129/examples/js/loaders/GLTFLoader.js"></script>

<!-- GSAP -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>

<script>
const container = document.getElementById("container3D");

/* SCENE */
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(
  40,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 0, 8);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

/* LIGHTS */
scene.add(new THREE.AmbientLight(0xffffff, 2));

const light = new THREE.DirectionalLight(0xffffff, 3);
light.position.set(5, 5, 5);
scene.add(light);

/* MODEL */
let bee, mixer;
const loader = new THREE.GLTFLoader();

loader.load(
  "https://raw.githubusercontent.com/DennysDionigi/bee-glb/main/demon_bee_full_texture.glb",
  function (gltf) {
    bee = gltf.scene;

    // FIX visibility
    bee.scale.set(2, 2, 2);
    bee.position.set(0, -1, 0);

    scene.add(bee);

    mixer = new THREE.AnimationMixer(bee);
    mixer.clipAction(gltf.animations[0]).play();
  },
  undefined,
  function (error) {
    alert("Model failed to load");
    console.error(error);
  }
);

/* ANIMATION */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  if (mixer) mixer.update(clock.getDelta());

  renderer.render(scene, camera);
}
animate();

/* RESIZE */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
